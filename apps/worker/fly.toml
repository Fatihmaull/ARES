# Fly.io app config for ares-worker.
# Deploy from the repo root (Fly resolves the monorepo via the Dockerfile
# in apps/worker/Dockerfile).
app = "ares-worker"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "apps/worker/Dockerfile"

[env]
  NODE_ENV = "production"
  ASST_WORKER_HEALTH_PORT = "9090"
  ASST_REPO_ROOT = "/repo"

[[services]]
  protocol = "tcp"
  internal_port = 9090

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    type = "connections"
    soft_limit = 50
    hard_limit = 100

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"

  [[services.http_checks]]
    interval = "30s"
    grace_period = "30s"
    method = "get"
    path = "/health"
    protocol = "http"
    tls_skip_verify = false
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[deploy]
  strategy = "rolling"

[metrics]
  port = 9091
  path = "/metrics"
