name: Deploy Worker

on:
  push:
    branches:
      - improved-ares
      - main
    paths:
      - "apps/worker/**"
      - "packages/engine/**"
      - "packages/queue/**"
      - ".github/workflows/deploy-worker.yml"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Fly deploy ares-worker
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy worker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --config apps/worker/fly.toml \
            --dockerfile apps/worker/Dockerfile \
            --remote-only \
            --strategy rolling
